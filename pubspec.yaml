name: donelist_flutter
description: "DoneList - 记录你已完成的事，而非未完成的事。Flutter 原生 Android 版。"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  intl: ^0.20.1
  device_calendar: ^4.3.3
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  provider: ^6.1.2
  flutter_timezone: ^3.0.1
  timezone: ^0.9.4
  share_plus: ^10.1.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
